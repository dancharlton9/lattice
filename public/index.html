<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lattice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #1e1e2e;
      --bg-secondary: #181825;
      --bg-surface: #313244;
      --bg-hover: #45475a;
      --text-primary: #cdd6f4;
      --text-secondary: #a6adc8;
      --text-muted: #6c7086;
      --accent-blue: #89b4fa;
      --accent-mauve: #cba6f7;
      --accent-green: #a6e3a1;
      --accent-peach: #fab387;
      --accent-red: #f38ba8;
      --accent-teal: #94e2d5;
      --accent-yellow: #f9e2af;
      --border: #45475a;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 1fr;
      min-height: 100vh;
    }

    .app.reader-open {
      grid-template-columns: 1fr 1fr;
    }

    /* Feed panel */
    .feed-panel {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
      overflow-y: auto;
      max-height: 100vh;
    }

    .app.reader-open .feed-panel {
      max-width: 100%;
      border-right: 1px solid var(--border);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      color: var(--accent-blue);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .header h1 span {
      color: var(--text-muted);
      font-weight: 300;
    }

    .meta-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .icon-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 6px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Search & Filters */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: var(--accent-blue);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 16px;
      height: 16px;
    }

    .filter-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 8px 14px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .pill:hover {
      background: var(--bg-surface);
      color: var(--text-primary);
    }

    .pill.active {
      background: var(--accent-blue);
      color: var(--bg-primary);
      border-color: var(--accent-blue);
      font-weight: 500;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .stat-card .label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 4px;
    }

    .stat-card .value {
      font-size: 22px;
      font-weight: 500;
    }

    .stat-card .value.blue { color: var(--accent-blue); }
    .stat-card .value.green { color: var(--accent-green); }
    .stat-card .value.mauve { color: var(--accent-mauve); }
    .stat-card .value.peach { color: var(--accent-peach); }

    /* Feed items */
    .feed-grid {
      display: grid;
      gap: 6px;
    }

    .feed-item {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 12px;
      align-items: start;
      transition: all 0.15s;
      cursor: pointer;
    }

    .feed-item:hover {
      background: var(--bg-surface);
      border-color: var(--accent-blue);
    }

    .feed-item.active {
      border-color: var(--accent-blue);
      background: var(--bg-surface);
      border-left: 3px solid var(--accent-blue);
    }

    .feed-item .source-icon {
      width: 32px;
      height: 32px;
      background: var(--bg-surface);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-secondary);
    }

    .feed-item .source-icon svg {
      width: 16px;
      height: 16px;
    }

    .feed-item .content {
      min-width: 0;
    }

    .feed-item .title {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .feed-item .summary {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .feed-item .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
    }

    .feed-item .source-name {
      color: var(--accent-blue);
    }

    .feed-item .time {
      color: var(--text-muted);
    }

    .category-tag {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .cat-labs { background: rgba(137, 180, 250, 0.15); color: var(--accent-blue); }
    .cat-community { background: rgba(166, 227, 161, 0.15); color: var(--accent-green); }
    .cat-news { background: rgba(250, 179, 135, 0.15); color: var(--accent-peach); }
    .cat-research { background: rgba(203, 166, 247, 0.15); color: var(--accent-mauve); }
    .cat-blogs { background: rgba(148, 226, 213, 0.15); color: var(--accent-teal); }
    .cat-newsletters { background: rgba(249, 226, 175, 0.15); color: var(--accent-yellow); }

    .feed-item .item-actions {
      display: flex;
      gap: 4px;
      align-self: center;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .feed-item:hover .item-actions {
      opacity: 1;
    }

    .item-action-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: all 0.15s;
    }

    .item-action-btn:hover {
      color: var(--accent-blue);
      background: rgba(137, 180, 250, 0.1);
    }

    .item-action-btn svg {
      width: 14px;
      height: 14px;
    }

    /* Reader panel */
    .reader-panel {
      background: var(--bg-secondary);
      overflow-y: auto;
      max-height: 100vh;
      display: none;
    }

    .app.reader-open .reader-panel {
      display: block;
    }

    .reader-header {
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }

    .reader-header .reader-source {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent-blue);
    }

    .reader-header .reader-spacer {
      flex: 1;
    }

    .reader-body {
      padding: 32px 40px;
      max-width: 720px;
    }

    .reader-body .reader-title {
      font-size: 24px;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .reader-body .reader-meta {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reader-content {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    .reader-content h1, .reader-content h2, .reader-content h3,
    .reader-content h4, .reader-content h5, .reader-content h6 {
      color: var(--text-primary);
      margin: 1.5em 0 0.5em;
      font-weight: 500;
    }

    .reader-content h1 { font-size: 22px; }
    .reader-content h2 { font-size: 18px; }
    .reader-content h3 { font-size: 16px; }

    .reader-content p {
      margin-bottom: 1em;
    }

    .reader-content a {
      color: var(--accent-blue);
      text-decoration: none;
    }

    .reader-content a:hover {
      text-decoration: underline;
    }

    .reader-content img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius-sm);
      margin: 1em 0;
    }

    .reader-content pre {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      margin: 1em 0;
    }

    .reader-content code {
      background: var(--bg-primary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }

    .reader-content pre code {
      background: none;
      padding: 0;
    }

    .reader-content blockquote {
      border-left: 3px solid var(--accent-blue);
      padding-left: 16px;
      margin: 1em 0;
      color: var(--text-muted);
    }

    .reader-content ul, .reader-content ol {
      margin: 1em 0;
      padding-left: 24px;
    }

    .reader-content li {
      margin-bottom: 0.5em;
    }

    .reader-loading {
      padding: 60px 40px;
      text-align: center;
      color: var(--text-muted);
    }

    .reader-loading .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    /* Loading & Error states */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .loading .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-list {
      margin-bottom: 16px;
      padding: 10px 14px;
      background: rgba(243, 139, 168, 0.08);
      border: 1px solid rgba(243, 139, 168, 0.2);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--accent-red);
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .error-list svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .load-more {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .load-more:hover {
      background: var(--bg-surface);
      color: var(--text-primary);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .app.reader-open { grid-template-columns: 1fr; }
      .app.reader-open .feed-panel { display: none; }
      .reader-panel { position: fixed; inset: 0; z-index: 100; }
    }

    @media (max-width: 768px) {
      .feed-panel { padding: 16px; }
      .feed-item { grid-template-columns: 32px 1fr; padding: 12px 14px; }
      .feed-item .item-actions { display: none; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .reader-body { padding: 20px; }
    }

    /* Embeddable iframe mode */
    body.embedded { background: transparent; }
    body.embedded .app { grid-template-columns: 1fr !important; }
    body.embedded .feed-panel { padding: 8px; }
    body.embedded .header, body.embedded .controls, body.embedded .stats-row { display: none; }
    body.embedded .feed-item { padding: 10px 12px; border-radius: var(--radius-sm); }
    body.embedded .reader-panel { display: none !important; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="feed-panel" id="feedPanel">
      <div class="header">
        <div class="header-left">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
            <line x1="10" y1="6.5" x2="14" y2="6.5" opacity="0.4"/>
            <line x1="10" y1="17.5" x2="14" y2="17.5" opacity="0.4"/>
            <line x1="6.5" y1="10" x2="6.5" y2="14" opacity="0.4"/>
            <line x1="17.5" y1="10" x2="17.5" y2="14" opacity="0.4"/>
          </svg>
          <h1>Lattice <span>AI News</span></h1>
        </div>
        <div class="meta-bar">
          <div class="status-dot"></div>
          <span id="status">Loading...</span>
          <button class="icon-btn" onclick="refresh()" title="Refresh feeds">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </div>

      <div class="stats-row" id="stats"></div>

      <div id="errors"></div>

      <div class="controls">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search" placeholder="Search articles..." oninput="debounceSearch()">
        </div>
        <div class="filter-pills" id="filters"></div>
      </div>

      <div class="feed-grid" id="feed"></div>
    </div>

    <div class="reader-panel" id="readerPanel">
      <div class="reader-header">
        <button class="icon-btn" onclick="closeReader()" title="Close reader">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <span class="reader-source" id="readerSource"></span>
        <span class="reader-spacer"></span>
        <button class="icon-btn" onclick="openExternal()" title="Open in browser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
      </div>
      <div id="readerBody"></div>
    </div>
  </div>

  <script>
    // Lucide icon SVGs (subset used in the app)
    const ICONS = {
      brain: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>',
      bot: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>',

      hexagon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>',
      smile: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>',
      'pen-tool': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>',
      microscope: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/></svg>',
      'message-circle': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>',
      terminal: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>',
      newspaper: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>',
      monitor: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
      rocket: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>',
      'file-text': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>',
      mail: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>',
      inbox: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>',
      rss: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>',
      'alert-triangle': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    };

    function getIcon(name) {
      return ICONS[name] || ICONS.rss;
    }

    // State
    let allItems = [];
    let currentCategory = null;
    let displayCount = 30;
    let searchTimer = null;
    let activeItemId = null;
    let currentReaderUrl = '';

    // Embedded mode
    if (new URLSearchParams(location.search).has('embed')) {
      document.body.classList.add('embedded');
    }

    function debounceSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => loadFeed(), 300);
    }

    async function loadFeed() {
      const search = document.getElementById('search').value;
      const params = new URLSearchParams({ limit: 200 });
      if (currentCategory) params.set('category', currentCategory);
      if (search) params.set('search', search);

      try {
        const res = await fetch(`/api/feed?${params}`);
        const data = await res.json();
        allItems = data.items;
        displayCount = 30;
        renderFeed();
        updateStatus(data);
        renderErrors(data.errors);
      } catch (e) {
        document.getElementById('feed').innerHTML =
          '<div class="loading">Failed to load feed. Is the server running?</div>';
      }
    }

    function renderFeed() {
      const container = document.getElementById('feed');
      const items = allItems.slice(0, displayCount);

      if (!items.length) {
        container.innerHTML = '<div class="loading">No articles found</div>';
        return;
      }

      container.innerHTML = items.map(item => `
        <div class="feed-item ${item.id === activeItemId ? 'active' : ''}" onclick="openArticle('${escAttr(item.id)}', '${escAttr(item.link)}', '${escAttr(item.source)}', '${escAttr(item.title)}', '${escAttr(item.icon)}')">
          <div class="source-icon">${getIcon(item.icon)}</div>
          <div class="content">
            <div class="title">${escHtml(item.title)}</div>
            ${item.summary ? `<div class="summary">${escHtml(item.summary)}</div>` : ''}
            <div class="meta">
              <span class="source-name">${escHtml(item.source)}</span>
              <span class="time">${timeAgo(item.timestamp)}</span>
              <span class="category-tag cat-${item.category.toLowerCase()}">${item.category}</span>
            </div>
          </div>
          <div class="item-actions">
            <button class="item-action-btn" onclick="event.stopPropagation(); window.open('${escAttr(item.link)}', '_blank')" title="Open in new tab">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </button>
          </div>
        </div>
      `).join('');

      if (allItems.length > displayCount) {
        container.innerHTML += `
          <button class="load-more" onclick="loadMore()">
            Show more (${allItems.length - displayCount} remaining)
          </button>`;
      }
    }

    function loadMore() {
      displayCount += 30;
      renderFeed();
    }

    // Reader view
    async function openArticle(id, url, source, title, icon) {
      activeItemId = id;
      currentReaderUrl = url;
      renderFeed(); // highlight active

      const app = document.getElementById('app');
      app.classList.add('reader-open');

      document.getElementById('readerSource').textContent = source;
      document.getElementById('readerBody').innerHTML = `
        <div class="reader-loading">
          <div class="spinner"></div>
          Loading article...
        </div>`;

      // First try to get full content from RSS cache
      try {
        const articleRes = await fetch(`/api/article/${id}`);
        if (articleRes.ok) {
          const article = await articleRes.json();
          if (article.fullContent && article.fullContent.length > 200) {
            renderReaderContent(article.title, source, article.fullContent, url);
            return;
          }
        }
      } catch (e) {}

      // Fallback: fetch from URL via proxy
      try {
        const res = await fetch(`/api/content?url=${encodeURIComponent(url)}`);
        const data = await res.json();
        renderReaderContent(data.title || title, source, data.content, url);
      } catch (e) {
        document.getElementById('readerBody').innerHTML = `
          <div class="reader-body">
            <h2 class="reader-title">${escHtml(title)}</h2>
            <p style="color: var(--text-muted)">Could not load article content.
              <a href="${escAttr(url)}" target="_blank" rel="noopener" style="color: var(--accent-blue)">Open in browser</a>
            </p>
          </div>`;
      }
    }

    function renderReaderContent(title, source, content, url) {
      document.getElementById('readerBody').innerHTML = `
        <div class="reader-body">
          <h1 class="reader-title">${escHtml(title)}</h1>
          <div class="reader-meta">
            <span>${escHtml(source)}</span>
          </div>
          <div class="reader-content">${content}</div>
        </div>`;
    }

    function closeReader() {
      document.getElementById('app').classList.remove('reader-open');
      activeItemId = null;
      currentReaderUrl = '';
      renderFeed();
    }

    function openExternal() {
      if (currentReaderUrl) window.open(currentReaderUrl, '_blank');
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeReader();
    });

    function updateStatus(data) {
      document.getElementById('status').textContent =
        `${data.total} articles`;
    }

    function renderErrors(errors) {
      const container = document.getElementById('errors');
      if (!errors?.length) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = `
        <div class="error-list">
          ${getIcon('alert-triangle')}
          <span>${errors.length} feed(s) failed: ${errors.map(e => e.source).join(', ')}</span>
        </div>`;
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const stats = await res.json();
        document.getElementById('stats').innerHTML = `
          <div class="stat-card">
            <div class="label">Sources</div>
            <div class="value blue">${stats.feedCount}</div>
          </div>
          <div class="stat-card">
            <div class="label">Articles</div>
            <div class="value green">${stats.itemCount}</div>
          </div>
          <div class="stat-card">
            <div class="label">Categories</div>
            <div class="value mauve">${stats.categories?.length || 0}</div>
          </div>
          <div class="stat-card">
            <div class="label">Errors</div>
            <div class="value peach">${stats.errors?.length || 0}</div>
          </div>
        `;
      } catch (e) {}
    }

    async function loadFilters() {
      try {
        const res = await fetch('/api/sources');
        const sources = await res.json();
        const categories = Object.keys(sources);
        const container = document.getElementById('filters');
        container.innerHTML = `
          <div class="pill active" onclick="setCategory(null, this)">All</div>
          ${categories.map(c => `
            <div class="pill" onclick="setCategory('${c}', this)">${c}</div>
          `).join('')}
        `;
      } catch (e) {}
    }

    function setCategory(cat, el) {
      currentCategory = cat;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      loadFeed();
    }

    function refresh() {
      document.getElementById('feed').innerHTML =
        '<div class="loading"><div class="spinner"></div>Refreshing feeds...</div>';
      loadFeed();
      loadStats();
    }

    function timeAgo(ts) {
      const diff = Date.now() - ts;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      return `${days}d ago`;
    }

    function escHtml(text) {
      const d = document.createElement('div');
      d.textContent = text || '';
      return d.innerHTML;
    }

    function escAttr(text) {
      return (text || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    // Init
    loadStats();
    loadFilters();
    loadFeed();
    setInterval(() => { loadFeed(); loadStats(); }, 300000);
  </script>
</body>
</html>
