<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lattice — AI News</title>
  <meta name="description" content="Self-hosted AI news aggregator — read, save, and follow AI news across sources.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#1e1e2e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #1e1e2e;
      --bg-secondary: #181825;
      --bg-surface: #313244;
      --bg-hover: #45475a;
      --text-primary: #cdd6f4;
      --text-secondary: #a6adc8;
      --text-muted: #6c7086;
      --accent-blue: #89b4fa;
      --accent-mauve: #cba6f7;
      --accent-green: #a6e3a1;
      --accent-peach: #fab387;
      --accent-red: #f38ba8;
      --accent-teal: #94e2d5;
      --accent-yellow: #f9e2af;
      --border: #45475a;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* Themed scrollbars */
    * { scrollbar-width: thin; scrollbar-color: var(--bg-surface) transparent; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--bg-surface);
      border-radius: 5px;
      border: 2px solid var(--bg-secondary);
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--bg-hover); }

    .app {
      min-height: 100vh;
    }

    /* Feed panel */
    .feed-panel {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
    }

    .app.reader-open .feed-panel {
      display: none;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }
    .brand-mark {
      height: 36px;
      width: 36px;
      display: block;
    }
    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }
    .brand-name {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }
    .brand-tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--accent-teal);
      margin-top: 4px;
      opacity: 0.75;
    }
    @media (max-width: 768px) {
      .brand-mark { height: 30px; width: 30px; }
      .brand-name { font-size: 20px; }
      .brand-tagline { font-size: 9px; }
    }

    .meta-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .icon-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 6px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Search & Filters */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: var(--accent-blue);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 16px;
      height: 16px;
    }

    .filter-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 8px 14px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .pill:hover {
      background: var(--bg-surface);
      color: var(--text-primary);
    }

    .pill.active {
      background: var(--accent-blue);
      color: var(--bg-primary);
      border-color: var(--accent-blue);
      font-weight: 500;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .stat-card .label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 4px;
    }

    .stat-card .value {
      font-size: 22px;
      font-weight: 500;
    }

    .stat-card .value.blue { color: var(--accent-blue); }
    .stat-card .value.green { color: var(--accent-green); }
    .stat-card .value.mauve { color: var(--accent-mauve); }
    .stat-card .value.peach { color: var(--accent-peach); }

    /* Feed items */
    .feed-grid {
      display: grid;
      gap: 6px;
    }

    .feed-item {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 12px;
      align-items: start;
      transition: all 0.15s;
      cursor: pointer;
    }

    .feed-item:hover {
      background: var(--bg-surface);
      border-color: var(--accent-blue);
    }

    .feed-item.active {
      border-color: var(--accent-blue);
      background: var(--bg-surface);
      border-left: 3px solid var(--accent-blue);
    }

    .feed-item .source-icon {
      width: 32px;
      height: 32px;
      background: var(--bg-surface);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-secondary);
    }

    .feed-item .source-icon svg {
      width: 16px;
      height: 16px;
    }

    .feed-item .content {
      min-width: 0;
    }

    .feed-item .title {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .feed-item .summary {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .feed-item .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
    }

    .feed-item .source-name {
      color: var(--accent-blue);
    }

    .feed-item .time {
      color: var(--text-muted);
    }

    .category-tag {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .cat-labs { background: rgba(137, 180, 250, 0.15); color: var(--accent-blue); }
    .cat-community { background: rgba(166, 227, 161, 0.15); color: var(--accent-green); }
    .cat-news { background: rgba(250, 179, 135, 0.15); color: var(--accent-peach); }
    .cat-research { background: rgba(203, 166, 247, 0.15); color: var(--accent-mauve); }
    .cat-blogs { background: rgba(148, 226, 213, 0.15); color: var(--accent-teal); }
    .cat-newsletters { background: rgba(249, 226, 175, 0.15); color: var(--accent-yellow); }

    .feed-item .item-actions {
      display: flex;
      gap: 4px;
      align-self: center;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .feed-item:hover .item-actions {
      opacity: 1;
    }

    .item-action-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: all 0.15s;
    }

    .item-action-btn:hover {
      color: var(--accent-blue);
      background: rgba(137, 180, 250, 0.1);
    }

    .item-action-btn svg {
      width: 14px;
      height: 14px;
    }

    /* Reader panel */
    .reader-panel {
      background: var(--bg-secondary);
      display: none;
    }

    .app.reader-open .reader-panel {
      display: block;
    }

    .reader-header {
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }

    .reader-header .reader-source {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent-blue);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reader-header .reader-spacer {
      flex: 1;
    }

    .reader-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .reader-position {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      min-width: 52px;
      text-align: center;
    }

    .icon-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .icon-btn:disabled:hover {
      background: var(--bg-surface);
      color: var(--text-secondary);
    }

    .reader-body {
      padding: 32px 40px;
      max-width: 760px;
      margin: 0 auto;
    }

    .reader-body .reader-title {
      font-size: 24px;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .reader-body .reader-meta {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reader-content {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    .reader-content h1, .reader-content h2, .reader-content h3,
    .reader-content h4, .reader-content h5, .reader-content h6 {
      color: var(--text-primary);
      margin: 1.5em 0 0.5em;
      font-weight: 500;
    }

    .reader-content h1 { font-size: 22px; }
    .reader-content h2 { font-size: 18px; }
    .reader-content h3 { font-size: 16px; }

    .reader-content p {
      margin-bottom: 1em;
    }

    .reader-content a {
      color: var(--accent-blue);
      text-decoration: none;
    }

    .reader-content a:hover {
      text-decoration: underline;
    }

    .reader-content img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius-sm);
      margin: 1em 0;
    }

    .reader-content pre {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      margin: 1em 0;
    }

    .reader-content code {
      background: var(--bg-primary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }

    .reader-content pre code {
      background: none;
      padding: 0;
    }

    .reader-content blockquote {
      border-left: 3px solid var(--accent-blue);
      padding-left: 16px;
      margin: 1em 0;
      color: var(--text-muted);
    }

    .reader-content ul, .reader-content ol {
      margin: 1em 0;
      padding-left: 24px;
    }

    .reader-content li {
      margin-bottom: 0.5em;
    }

    .reader-loading {
      padding: 60px 40px;
      text-align: center;
      color: var(--text-muted);
    }

    .reader-loading .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    /* Loading & Error states */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .loading .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-list {
      margin-bottom: 16px;
      padding: 10px 14px;
      background: rgba(243, 139, 168, 0.08);
      border: 1px solid rgba(243, 139, 168, 0.2);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--accent-red);
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .error-list svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .load-more {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .load-more:hover {
      background: var(--bg-surface);
      color: var(--text-primary);
    }

    /* Read / saved / selected states on feed items */
    .feed-item.read .title { color: var(--text-muted); font-weight: 300; }
    .feed-item.read .summary { opacity: 0.6; }
    .feed-item.read .source-icon { opacity: 0.5; }

    .feed-item.selected {
      outline: 2px solid var(--accent-blue);
      outline-offset: -2px;
    }

    .saved-indicator {
      color: var(--accent-yellow);
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    .related-badge {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      background: rgba(148, 226, 213, 0.12);
      color: var(--accent-teal);
      white-space: nowrap;
    }

    /* New-articles notification banner */
    .new-banner {
      position: sticky;
      top: 8px;
      z-index: 20;
      margin: 0 auto 12px;
      padding: 10px 16px;
      background: linear-gradient(90deg, rgba(137,180,250,0.2), rgba(203,166,247,0.2));
      border: 1px solid var(--accent-blue);
      border-radius: 24px;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      animation: slide-in 0.25s ease-out;
    }
    .new-banner:hover { background: linear-gradient(90deg, rgba(137,180,250,0.3), rgba(203,166,247,0.3)); }
    .new-banner svg { width: 14px; height: 14px; color: var(--accent-blue); }
    @keyframes slide-in { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Filter group */
    .filter-group {
      display: flex;
      gap: 0;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }
    .filter-group .seg {
      padding: 8px 14px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: 'Outfit', sans-serif;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-group .seg:hover { color: var(--text-primary); }
    .filter-group .seg.active {
      background: var(--accent-blue);
      color: var(--bg-primary);
      font-weight: 500;
    }

    /* Feed health panel */
    .stat-card.clickable { cursor: pointer; transition: border-color 0.15s; }
    .stat-card.clickable:hover { border-color: var(--accent-blue); }

    .health-panel {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .health-panel h3 {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .health-row {
      display: grid;
      grid-template-columns: 12px 1fr auto auto 44px;
      gap: 10px;
      align-items: center;
      padding: 6px 0;
      font-size: 12px;
    }
    .health-row.unsubscribed .src,
    .health-row.unsubscribed .age { opacity: 0.45; }

    /* iOS-ish toggle */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      display: inline-block;
      cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; inset: 0;
      background: var(--bg-surface);
      border-radius: 20px;
      transition: background 0.15s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: var(--text-primary);
      border-radius: 50%;
      transition: transform 0.15s;
    }
    .toggle input:checked + .slider { background: var(--accent-green); }
    .toggle input:checked + .slider::before { transform: translateX(16px); background: var(--bg-primary); }

    .health-panel-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .health-panel-actions .bulk {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
    }
    .health-panel-actions .bulk:hover { color: var(--accent-blue); }
    .health-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .health-dot.ok { background: var(--accent-green); }
    .health-dot.degraded { background: var(--accent-yellow); }
    .health-dot.stale { background: var(--accent-peach); }
    .health-dot.down { background: var(--accent-red); }
    .health-row .src { color: var(--text-primary); }
    .health-row .age { color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .health-row .cat { color: var(--accent-blue); font-family: 'JetBrains Mono', monospace; font-size: 10px; }

    /* Reader action button (save/summary) */
    .icon-btn.active { color: var(--accent-yellow); background: rgba(249, 226, 175, 0.12); }
    .icon-btn.active:hover { background: rgba(249, 226, 175, 0.2); }

    .ai-summary {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent-mauve);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
      white-space: pre-wrap;
    }
    .ai-summary .label {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent-mauve);
      margin-bottom: 6px;
    }

    .keyboard-hint {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .keyboard-hint kbd {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: inherit;
      color: var(--text-secondary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .feed-panel { padding: 16px; }
      .feed-item { grid-template-columns: 32px 1fr; padding: 12px 14px; }
      .feed-item .item-actions { display: none; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .reader-body { padding: 20px; }
      .reader-header { padding: 10px 14px; gap: 8px; }
      .reader-position { min-width: 0; font-size: 10px; }
      .reader-header .reader-source { font-size: 11px; }
      .keyboard-hint { display: none; }
    }

    /* Cookie banner */
    .cookie-banner {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 640px;
      width: calc(100% - 32px);
      padding: 12px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.5;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      box-shadow: 0 6px 24px rgba(0,0,0,0.3);
      z-index: 200;
    }
    .cookie-banner a {
      color: var(--accent-blue);
      text-decoration: none;
      cursor: pointer;
    }
    .cookie-banner a:hover { text-decoration: underline; }
    .cookie-banner button {
      margin-left: auto;
      padding: 6px 14px;
      background: var(--accent-blue);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      padding: 20px 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .footer a {
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
    }
    .footer a:hover { color: var(--accent-blue); }
    .footer .footer-links { display: flex; gap: 16px; }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      padding: 20px;
    }
    .modal {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-width: 560px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px 32px;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }
    .modal h2 {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 16px;
    }
    .modal h3 {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin: 16px 0 6px;
    }
    .modal p { margin-bottom: 12px; }
    .modal ul { margin: 8px 0 12px 20px; }
    .modal li { margin-bottom: 4px; }
    .modal a { color: var(--accent-blue); text-decoration: none; }
    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      margin: -8px -8px 0 0;
    }
    .modal-close:hover { color: var(--text-primary); }

    /* Embeddable iframe mode */
    body.embedded { background: transparent; }
    body.embedded .app { grid-template-columns: 1fr !important; }
    body.embedded .feed-panel { padding: 8px; }
    body.embedded .header, body.embedded .controls, body.embedded .stats-row { display: none; }
    body.embedded .feed-item { padding: 10px 12px; border-radius: var(--radius-sm); }
    body.embedded .reader-panel { display: none !important; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="feed-panel" id="feedPanel">
      <div class="header">
        <div class="header-left">
          <a href="/" class="brand" aria-label="Lattice home">
            <img class="brand-mark" src="/lattice-mark-mocha.svg" alt="">
            <span class="brand-text">
              <span class="brand-name">lattice</span>
              <span class="brand-tagline">AI.NEWS</span>
            </span>
          </a>
        </div>
        <div class="meta-bar">
          <div class="status-dot"></div>
          <span id="status">Loading...</span>
          <button class="icon-btn" data-action="refresh" title="Refresh feeds">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </div>

      <div class="stats-row" id="stats"></div>

      <div id="errors"></div>
      <div id="healthPanel"></div>

      <div class="controls">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search" placeholder="Search articles...">
        </div>
        <div class="filter-group" id="readFilter">
          <button class="seg active" data-action="set-read-filter" data-value="all">All</button>
          <button class="seg" data-action="set-read-filter" data-value="unread">Unread</button>
          <button class="seg" data-action="set-read-filter" data-value="saved">Saved</button>
        </div>
        <div class="filter-pills" id="filters"></div>
      </div>

      <div id="newBannerSlot"></div>
      <div class="feed-grid" id="feed"></div>

      <div class="keyboard-hint" style="margin-top:16px">
        <span><kbd>j</kbd>/<kbd>k</kbd> move</span>
        <span><kbd>o</kbd>/<kbd>Enter</kbd> open</span>
        <span><kbd>s</kbd> save</span>
        <span><kbd>m</kbd> mark read</span>
        <span><kbd>r</kbd> refresh</span>
      </div>

      <footer class="footer">
        <span>© 2026 lattice · readlattice.co</span>
        <div class="footer-links">
          <a data-action="show-modal" data-modal="about">About</a>
          <a data-action="show-modal" data-modal="privacy">Privacy</a>
        </div>
      </footer>
    </div>

    <div class="reader-panel" id="readerPanel">
      <div class="reader-header">
        <button class="icon-btn" data-action="close-reader" title="Back to feed">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <span class="reader-source" id="readerSource"></span>
        <span class="reader-spacer"></span>
        <div class="reader-nav">
          <button class="icon-btn" id="prevBtn" data-action="prev-article" title="Previous article (←)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span class="reader-position" id="readerPosition"></span>
          <button class="icon-btn" id="nextBtn" data-action="next-article" title="Next article (→)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <button class="icon-btn" id="summaryBtn" data-action="request-summary" title="AI summary" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </button>
        <button class="icon-btn" id="saveBtn" data-action="toggle-save-active" title="Save (s)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
        <button class="icon-btn" data-action="open-external-reader" title="Open in browser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
      </div>
      <div id="readerBody"></div>
    </div>
  </div>

  <div id="cookieBanner" class="cookie-banner" hidden>
    <span>
      Lattice stores one anonymous cookie so we can remember what you've read,
      saved, and unsubscribed from. No tracking, no analytics, no third parties.
      <a data-action="show-modal" data-modal="privacy">Learn more</a>
    </span>
    <button data-action="dismiss-cookie-banner">OK</button>
  </div>

  <div id="modalRoot"></div>

  <script>
    // Lucide icon SVGs (subset used in the app)
    const ICONS = {
      brain: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>',
      bot: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>',
      sparkles: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>',
      hexagon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>',
      smile: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>',
      'pen-tool': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>',
      microscope: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/></svg>',
      'message-circle': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>',
      terminal: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>',
      newspaper: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>',
      monitor: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
      rocket: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>',
      'file-text': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>',
      mail: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>',
      inbox: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>',
      rss: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>',
      'alert-triangle': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    };

    function getIcon(name) {
      return ICONS[name] || ICONS.rss;
    }

    // State
    let allItems = [];
    let currentCategory = null;
    let displayCount = 30;
    let searchTimer = null;
    let activeItemId = null;
    let currentReaderUrl = '';
    let currentReaderSaved = false;
    let feedScrollY = 0;
    let readerRequestId = 0;
    let readFilter = 'all';              // all | unread | saved
    let selectedIndex = -1;              // keyboard cursor in feed
    let lastSeenMaxTs = 0;               // newest article ts the client has shown
    let pendingNewCount = 0;
    let healthPanelOpen = false;
    let aiEnabled = false;

    // Embedded mode
    if (new URLSearchParams(location.search).has('embed')) {
      document.body.classList.add('embedded');
    }

    function debounceSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => loadFeed(), 300);
    }

    async function loadFeed() {
      const search = document.getElementById('search').value;
      const params = new URLSearchParams({ limit: 200 });
      if (currentCategory) params.set('category', currentCategory);
      if (search) params.set('search', search);
      if (readFilter === 'unread') params.set('read', 'false');
      if (readFilter === 'saved') params.set('saved', 'true');

      try {
        const res = await fetch(`/api/feed?${params}`);
        const data = await res.json();
        allItems = data.items;
        displayCount = 30;
        if (allItems.length) lastSeenMaxTs = Math.max(lastSeenMaxTs, allItems[0].timestamp);
        if (selectedIndex >= allItems.length) selectedIndex = allItems.length - 1;
        renderFeed();
        updateStatus(data);
        renderErrors(data.errors);
        hideNewBanner();
        if (document.getElementById('app').classList.contains('reader-open')) {
          updateReaderNav();
        }
      } catch (e) {
        document.getElementById('feed').innerHTML =
          '<div class="loading">Failed to load feed. Is the server running?</div>';
      }
    }

    function renderFeed() {
      const container = document.getElementById('feed');
      const items = allItems.slice(0, displayCount);

      if (!items.length) {
        container.innerHTML = '<div class="loading">No articles found</div>';
        return;
      }

      container.innerHTML = items.map((item, idx) => {
        const classes = ['feed-item'];
        if (item.id === activeItemId) classes.push('active');
        if (item.read) classes.push('read');
        if (idx === selectedIndex) classes.push('selected');
        const related = (item.relatedSources || []).length;
        return `
          <div class="${classes.join(' ')}" data-action="open-article" data-index="${idx}" data-id="${escAttr(item.id)}">
            <div class="source-icon">${getIcon(item.icon)}</div>
            <div class="content">
              <div class="title">${escHtml(item.title)}</div>
              ${item.summary ? `<div class="summary">${escHtml(item.summary)}</div>` : ''}
              <div class="meta">
                <span class="source-name">${escHtml(item.source)}</span>
                <span class="time">${timeAgo(item.timestamp)}</span>
                <span class="category-tag cat-${item.category.toLowerCase()}">${item.category}</span>
                ${related ? `<span class="related-badge" title="Also covered by: ${escAttr((item.relatedSources || []).join(', '))}">+${related} related</span>` : ''}
                ${item.saved ? `<svg class="saved-indicator" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>` : ''}
              </div>
            </div>
            <div class="item-actions">
              <button class="item-action-btn" data-action="toggle-save" data-id="${escAttr(item.id)}" data-stop="1" title="${item.saved ? 'Unsave' : 'Save'} (s)">
                <svg viewBox="0 0 24 24" fill="${item.saved ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              </button>
              <button class="item-action-btn" data-action="toggle-read" data-id="${escAttr(item.id)}" data-stop="1" title="${item.read ? 'Mark unread' : 'Mark read'} (m)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </button>
              <button class="item-action-btn" data-action="open-external" data-href="${escAttr(item.link)}" data-stop="1" title="Open in new tab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              </button>
            </div>
          </div>
        `;
      }).join('');

      if (allItems.length > displayCount) {
        container.innerHTML += `
          <button class="load-more" data-action="load-more">
            Show more (${allItems.length - displayCount} remaining)
          </button>`;
      }
    }

    function loadMore() {
      displayCount += 30;
      renderFeed();
    }

    // Local state mutation helpers (optimistic)
    function updateLocalItem(id, patch) {
      const item = allItems.find(i => i.id === id);
      if (item) Object.assign(item, patch);
    }

    async function toggleRead(id) {
      const item = allItems.find(i => i.id === id);
      if (!item) return;
      const newState = !item.read;
      updateLocalItem(id, { read: newState });
      renderFeed();
      try {
        await fetch(`/api/article/${id}/read`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ read: newState }),
        });
      } catch (e) {
        updateLocalItem(id, { read: !newState });
        renderFeed();
      }
    }

    async function toggleSave(id) {
      const item = allItems.find(i => i.id === id);
      if (!item) return;
      const newState = !item.saved;
      updateLocalItem(id, { saved: newState });
      renderFeed();
      if (id === activeItemId) setReaderSaved(newState);
      try {
        await fetch(`/api/article/${id}/save`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ saved: newState }),
        });
      } catch (e) {
        updateLocalItem(id, { saved: !newState });
        renderFeed();
        if (id === activeItemId) setReaderSaved(!newState);
      }
    }

    function toggleSaveActive() {
      if (activeItemId) toggleSave(activeItemId);
    }

    function setReaderSaved(saved) {
      currentReaderSaved = saved;
      const btn = document.getElementById('saveBtn');
      btn.classList.toggle('active', !!saved);
      btn.title = saved ? 'Unsave (s)' : 'Save (s)';
      btn.querySelector('svg').setAttribute('fill', saved ? 'currentColor' : 'none');
    }

    // Reader view — hash-routed as #article/<id>
    function openArticle(id) {
      const target = `#article/${encodeURIComponent(id)}`;
      if (location.hash === target) return;
      if (!location.hash.startsWith('#article/')) {
        feedScrollY = window.scrollY;
      }
      location.hash = target;
    }

    function gotoPrev() {
      const idx = allItems.findIndex(i => i.id === activeItemId);
      if (idx > 0) openArticle(allItems[idx - 1].id);
    }

    function gotoNext() {
      const idx = allItems.findIndex(i => i.id === activeItemId);
      if (idx >= 0 && idx < allItems.length - 1) openArticle(allItems[idx + 1].id);
    }

    function updateReaderNav() {
      const idx = allItems.findIndex(i => i.id === activeItemId);
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const pos = document.getElementById('readerPosition');
      prevBtn.disabled = idx <= 0;
      nextBtn.disabled = idx < 0 || idx >= allItems.length - 1;
      pos.textContent = idx >= 0 ? `${idx + 1} / ${allItems.length}` : '';
    }

    async function showArticle(id) {
      const item = allItems.find(i => i.id === id);
      if (!item) return;

      activeItemId = id;
      currentReaderUrl = item.link;
      const requestId = ++readerRequestId;

      // Auto-mark read
      if (!item.read) {
        updateLocalItem(id, { read: true });
        fetch(`/api/article/${id}/read`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ read: true }),
        }).catch(() => updateLocalItem(id, { read: false }));
      }

      setReaderSaved(!!item.saved);
      document.getElementById('summaryBtn').hidden = !aiEnabled;
      document.getElementById('app').classList.add('reader-open');
      document.getElementById('readerSource').textContent = item.source;
      document.getElementById('readerBody').innerHTML = `
        <div class="reader-loading">
          <div class="spinner"></div>
          Loading article...
        </div>`;
      updateReaderNav();
      window.scrollTo(0, 0);

      // First try full content from RSS cache
      let article = null;
      try {
        const articleRes = await fetch(`/api/article/${id}`);
        if (requestId !== readerRequestId) return;
        if (articleRes.ok) article = await articleRes.json();
      } catch (e) {}
      if (requestId !== readerRequestId) return;

      if (article && article.fullContent && article.fullContent.length > 200) {
        renderReaderContent(article.title || item.title, item.source, article.fullContent, article);
        return;
      }

      // Fallback: fetch from URL via proxy (Readability)
      try {
        const res = await fetch(`/api/content?url=${encodeURIComponent(item.link)}`);
        if (requestId !== readerRequestId) return;
        const data = await res.json();
        if (requestId !== readerRequestId) return;
        const merged = { ...(article || {}), byline: data.byline, siteName: data.siteName };
        renderReaderContent(data.title || item.title, item.source, data.content, merged);
      } catch (e) {
        if (requestId !== readerRequestId) return;
        document.getElementById('readerBody').innerHTML = `
          <div class="reader-body">
            <h2 class="reader-title">${escHtml(item.title)}</h2>
            <p style="color: var(--text-muted)">Could not load article content.
              <a href="${escAttr(item.link)}" target="_blank" rel="noopener" style="color: var(--accent-blue)">Open in browser</a>
            </p>
          </div>`;
      }
    }

    function renderReaderContent(title, source, content, meta) {
      const byline = meta?.byline ? `<span>${escHtml(meta.byline)}</span>` : '';
      const related = (meta?.relatedSources || []).filter(s => s !== source);
      const relatedBadge = related.length
        ? `<span class="related-badge" title="Also covered by">+${related.length} related: ${escHtml(related.join(', '))}</span>`
        : '';
      const aiSummary = meta?.summaryAi
        ? `<div class="ai-summary"><div class="label">AI summary</div>${escHtml(meta.summaryAi)}</div>`
        : '';
      document.getElementById('readerBody').innerHTML = `
        <div class="reader-body">
          <h1 class="reader-title">${escHtml(title)}</h1>
          <div class="reader-meta">
            <span>${escHtml(source)}</span>
            ${byline}
            ${relatedBadge}
          </div>
          ${aiSummary}
          <div class="reader-content">${content}</div>
        </div>`;
    }

    async function requestSummary() {
      if (!activeItemId || !aiEnabled) return;
      const btn = document.getElementById('summaryBtn');
      btn.disabled = true;
      try {
        const res = await fetch(`/api/article/${activeItemId}/summary`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        const data = await res.json();
        if (data.summary) {
          // Re-show the article with the new summary merged in
          const item = allItems.find(i => i.id === activeItemId);
          const article = await fetch(`/api/article/${activeItemId}`).then(r => r.json());
          renderReaderContent(article.title || item.title, item.source, article.fullContent || '', article);
        }
      } finally {
        btn.disabled = false;
      }
    }

    function hideReader() {
      readerRequestId++;
      document.getElementById('app').classList.remove('reader-open');
      activeItemId = null;
      currentReaderUrl = '';
      renderFeed();
      window.scrollTo(0, feedScrollY);
    }

    function closeReader() {
      if (location.hash.startsWith('#article/')) {
        if (history.length > 1) {
          history.back();
        } else {
          history.replaceState(null, '', location.pathname + location.search);
          hideReader();
        }
      } else {
        hideReader();
      }
    }

    function handleRoute() {
      const m = location.hash.match(/^#article\/(.+)$/);
      if (m) {
        const id = decodeURIComponent(m[1]);
        if (id !== activeItemId) showArticle(id);
      } else {
        hideReader();
      }
    }

    window.addEventListener('hashchange', handleRoute);

    function openExternal() {
      if (currentReaderUrl) window.open(currentReaderUrl, '_blank');
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.target.matches('input, textarea')) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;

      // Modal short-circuits everything
      if (document.getElementById('modalRoot').children.length) {
        if (e.key === 'Escape') { closeModal(); e.preventDefault(); }
        return;
      }

      const readerOpen = document.getElementById('app').classList.contains('reader-open');

      if (readerOpen) {
        if (e.key === 'Escape') { closeReader(); e.preventDefault(); }
        else if (e.key === 'ArrowLeft' || e.key === 'k') { gotoPrev(); e.preventDefault(); }
        else if (e.key === 'ArrowRight' || e.key === 'j') { gotoNext(); e.preventDefault(); }
        else if (e.key === 's') { toggleSaveActive(); e.preventDefault(); }
        return;
      }

      // Feed view shortcuts
      if (e.key === 'j' || e.key === 'ArrowDown') { moveSelection(1); e.preventDefault(); }
      else if (e.key === 'k' || e.key === 'ArrowUp') { moveSelection(-1); e.preventDefault(); }
      else if (e.key === 'o' || e.key === 'Enter') { openSelected(); e.preventDefault(); }
      else if (e.key === 's') { saveSelected(); e.preventDefault(); }
      else if (e.key === 'm') { markSelected(); e.preventDefault(); }
      else if (e.key === 'r') { refresh(); e.preventDefault(); }
      else if (e.key === '/') { document.getElementById('search').focus(); e.preventDefault(); }
      else if (e.key === 'Escape') { document.getElementById('search').blur(); }
    });

    function moveSelection(delta) {
      const visible = Math.min(displayCount, allItems.length);
      if (!visible) return;
      if (selectedIndex < 0) selectedIndex = delta > 0 ? 0 : visible - 1;
      else selectedIndex = Math.max(0, Math.min(visible - 1, selectedIndex + delta));
      renderFeed();
      const el = document.querySelector(`.feed-item[data-index="${selectedIndex}"]`);
      if (el) el.scrollIntoView({ block: 'nearest' });
    }

    function currentSelection() {
      if (selectedIndex < 0 || selectedIndex >= allItems.length) return null;
      return allItems[selectedIndex];
    }

    function openSelected() {
      const item = currentSelection();
      if (item) openArticle(item.id);
    }

    function saveSelected() {
      const item = currentSelection();
      if (item) toggleSave(item.id);
    }

    function markSelected() {
      const item = currentSelection();
      if (item) toggleRead(item.id);
    }

    function updateStatus(data) {
      const unread = allItems.filter(i => !i.read).length;
      const el = document.getElementById('status');
      el.textContent = `${data.total} articles · ${unread} unread`;
    }

    function renderErrors(errors) {
      const container = document.getElementById('errors');
      if (!errors?.length) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = `
        <div class="error-list">
          ${getIcon('alert-triangle')}
          <span>${errors.length} feed(s) failed: ${errors.map(e => e.source).join(', ')}</span>
        </div>`;
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const stats = await res.json();
        aiEnabled = !!stats.aiEnabled;
        const sub = stats.subscribedCount ?? stats.feedCount;
        const total = stats.feedCount;
        const sourcesValue = sub === total ? total : `${sub}<span style="color:var(--text-muted);font-weight:300;font-size:14px;">/${total}</span>`;
        document.getElementById('stats').innerHTML = `
          <div class="stat-card clickable" data-action="toggle-health-panel" title="Manage your sources">
            <div class="label">Sources</div>
            <div class="value blue">${sourcesValue}</div>
          </div>
          <div class="stat-card">
            <div class="label">Unread</div>
            <div class="value green">${stats.unreadCount ?? 0}</div>
          </div>
          <div class="stat-card">
            <div class="label">Articles</div>
            <div class="value mauve">${stats.itemCount}</div>
          </div>
          <div class="stat-card ${stats.errors?.length ? 'clickable' : ''}" ${stats.errors?.length ? 'data-action="toggle-health-panel"' : ''}>
            <div class="label">Errors</div>
            <div class="value ${stats.errors?.length ? 'peach' : 'green'}">${stats.errors?.length || 0}</div>
          </div>
        `;
      } catch (e) {}
    }

    async function loadFilters() {
      try {
        const res = await fetch('/api/sources');
        const sources = await res.json();
        const categories = Object.keys(sources);
        const container = document.getElementById('filters');
        container.innerHTML = `
          <div class="pill active" data-action="set-category" data-value="">All</div>
          ${categories.map(c => `
            <div class="pill" data-action="set-category" data-value="${escAttr(c)}">${escHtml(c)}</div>
          `).join('')}
        `;
      } catch (e) {}
    }

    function setCategory(cat, el) {
      currentCategory = cat;
      document.querySelectorAll('.filter-pills .pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      selectedIndex = -1;
      loadFeed();
    }

    function setReadFilter(val, el) {
      readFilter = val;
      document.querySelectorAll('#readFilter .seg').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      selectedIndex = -1;
      loadFeed();
    }

    function refresh() {
      document.getElementById('feed').innerHTML =
        '<div class="loading"><div class="spinner"></div>Refreshing feeds...</div>';
      loadFeed();
      loadStats();
      loadFeedHealth();
    }

    // --- Background refresh + new-articles banner ---
    async function pollNewCount() {
      if (!lastSeenMaxTs) return;
      try {
        const res = await fetch(`/api/new-count?since=${lastSeenMaxTs}`);
        const data = await res.json();
        if (data.count > 0 && data.count !== pendingNewCount) {
          pendingNewCount = data.count;
          showNewBanner(data.count);
        }
      } catch (e) {}
    }

    function showNewBanner(count) {
      const slot = document.getElementById('newBannerSlot');
      slot.innerHTML = `
        <div class="new-banner" data-action="apply-pending-new">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          <span>${count} new article${count === 1 ? '' : 's'} — click to load</span>
        </div>`;
    }

    function hideNewBanner() {
      pendingNewCount = 0;
      document.getElementById('newBannerSlot').innerHTML = '';
    }

    function applyPendingNew() {
      hideNewBanner();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      loadFeed();
      loadStats();
    }

    // --- Feed health panel ---
    async function loadFeedHealth() {
      try {
        const res = await fetch('/api/feed-health');
        const health = await res.json();
        window._lastHealth = health;
        if (healthPanelOpen) renderHealthPanel();
      } catch (e) {}
    }

    function toggleHealthPanel() {
      healthPanelOpen = !healthPanelOpen;
      if (healthPanelOpen) renderHealthPanel();
      else document.getElementById('healthPanel').innerHTML = '';
    }

    function renderHealthPanel() {
      const health = window._lastHealth || [];
      const rows = health.map(h => {
        const age = h.lastSuccess ? timeAgo(h.lastSuccess) : 'never';
        const sub = h.subscribed !== false;
        return `
          <div class="health-row ${sub ? '' : 'unsubscribed'}" title="${escAttr(h.lastError || '')}">
            <div class="health-dot ${h.status}"></div>
            <div class="src">${escHtml(h.name)} <span class="cat">${escHtml(h.category || '')}</span></div>
            <div class="age">${h.itemCount || 0} items</div>
            <div class="age">${age}</div>
            <label class="toggle" title="${sub ? 'Unsubscribe' : 'Subscribe'}">
              <input type="checkbox" ${sub ? 'checked' : ''} data-action="toggle-subscription" data-name="${escAttr(h.name)}">
              <span class="slider"></span>
            </label>
          </div>
        `;
      }).join('');
      document.getElementById('healthPanel').innerHTML = `
        <div class="health-panel">
          <div class="health-panel-actions">
            <h3 style="margin:0">Sources</h3>
            <div>
              <button class="bulk" data-action="set-all-subscriptions" data-value="true">Select all</button>
              <button class="bulk" data-action="set-all-subscriptions" data-value="false">Deselect all</button>
            </div>
          </div>
          ${rows || '<div style="color:var(--text-muted); font-size:12px;">No data yet.</div>'}
        </div>`;
    }

    async function toggleSubscription(name, subscribed) {
      // Optimistically update in cache so the panel reflects instantly
      if (window._lastHealth) {
        const row = window._lastHealth.find(h => h.name === name);
        if (row) row.subscribed = subscribed;
        renderHealthPanel();
      }
      try {
        await fetch(`/api/my-feeds/${encodeURIComponent(name)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ subscribed }),
        });
      } catch (e) {
        if (window._lastHealth) {
          const row = window._lastHealth.find(h => h.name === name);
          if (row) row.subscribed = !subscribed;
          renderHealthPanel();
        }
        return;
      }
      loadFeed();
      loadStats();
    }

    async function setAllSubscriptions(subscribed) {
      const health = window._lastHealth || [];
      const targets = health.filter(h => (h.subscribed !== false) !== subscribed);
      if (!targets.length) return;
      for (const h of targets) h.subscribed = subscribed;
      renderHealthPanel();
      await Promise.allSettled(targets.map(h =>
        fetch(`/api/my-feeds/${encodeURIComponent(h.name)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ subscribed }),
        })
      ));
      loadFeed();
      loadStats();
    }

    function timeAgo(ts) {
      const diff = Date.now() - ts;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      return `${days}d ago`;
    }

    function escHtml(text) {
      const d = document.createElement('div');
      d.textContent = text || '';
      return d.innerHTML;
    }

    function escAttr(text) {
      return (text || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    // Cookie banner (informational — the cookie is functionally necessary)
    function dismissCookieBanner() {
      try { localStorage.setItem('lattice_cookie_ack', '1'); } catch (e) {}
      document.getElementById('cookieBanner').hidden = true;
    }
    try {
      if (!localStorage.getItem('lattice_cookie_ack')) {
        document.getElementById('cookieBanner').hidden = false;
      }
    } catch (e) {}

    // Modals
    const MODALS = {
      about: `
        <h2>About Lattice</h2>
        <p>Lattice is a self-hosted AI news aggregator. It pulls RSS feeds from
        labs, research groups, blogs, and community sources, deduplicates stories
        across them, and gives you a clean reader view.</p>
        <h3>Features</h3>
        <ul>
          <li>Cross-source story clustering</li>
          <li>Per-visitor read / saved / subscription state</li>
          <li>Background refresh with new-article notifications</li>
          <li>Readability-powered article view</li>
          <li>Keyboard navigation (<kbd>j</kbd>/<kbd>k</kbd>/<kbd>o</kbd>/<kbd>s</kbd>/<kbd>m</kbd>/<kbd>r</kbd>)</li>
        </ul>
        <p>Built by DCWD.</p>
      `,
      privacy: `
        <h2>Privacy</h2>
        <p>Lattice is deliberately minimal about what it collects.</p>
        <h3>The cookie</h3>
        <p>A single HttpOnly cookie — <code>lattice_uid</code> — stores a random
        UUID. It's used to scope your read / saved / subscription state to
        this browser. No other information is tied to it.</p>
        <h3>What we don't do</h3>
        <ul>
          <li>No analytics (no Google Analytics, Plausible, Mixpanel, etc.)</li>
          <li>No third-party tracking scripts</li>
          <li>No advertising</li>
          <li>No account, no email, no password</li>
        </ul>
        <h3>Logs</h3>
        <p>The server records basic request logs (IP, path, status) and
        container telemetry via Azure Log Analytics for operational purposes
        only. These expire per Azure's retention policy.</p>
        <h3>Article content</h3>
        <p>When you open an article, Lattice fetches it from the original
        publisher and extracts the readable text via Mozilla Readability. The
        original link is always one click away via the "open in browser"
        button.</p>
        <h3>Clearing your state</h3>
        <p>Clear your browser cookies for this site to reset everything. There
        is no account to delete.</p>
      `,
    };
    function showModal(name) {
      const html = MODALS[name];
      if (!html) return;
      document.getElementById('modalRoot').innerHTML = `
        <div class="modal-backdrop" data-action="close-modal-backdrop">
          <div class="modal">
            <button class="modal-close" data-action="close-modal" aria-label="Close">×</button>
            ${html}
          </div>
        </div>`;
    }
    function closeModal() {
      document.getElementById('modalRoot').innerHTML = '';
    }

    // Single delegated click dispatcher. CSP forbids inline handlers so every
    // interactive element carries `data-action="..."` and (where relevant)
    // `data-id`, `data-modal`, `data-value` etc.
    document.addEventListener('click', (e) => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      if (el.dataset.stop) e.stopPropagation();

      switch (el.dataset.action) {
        // Feed
        case 'open-article': openArticle(el.dataset.id); break;
        case 'toggle-read': toggleRead(el.dataset.id); break;
        case 'toggle-save': toggleSave(el.dataset.id); break;
        case 'open-external': window.open(el.dataset.href, '_blank', 'noopener'); break;
        case 'load-more': loadMore(); break;
        case 'refresh': refresh(); break;

        // Filters
        case 'set-category': setCategory(el.dataset.value || null, el); break;
        case 'set-read-filter': setReadFilter(el.dataset.value, el); break;

        // Reader
        case 'close-reader': closeReader(); break;
        case 'prev-article': gotoPrev(); break;
        case 'next-article': gotoNext(); break;
        case 'toggle-save-active': toggleSaveActive(); break;
        case 'request-summary': requestSummary(); break;
        case 'open-external-reader': openExternal(); break;

        // Sources / health panel
        case 'toggle-health-panel': toggleHealthPanel(); break;
        case 'set-all-subscriptions': setAllSubscriptions(el.dataset.value === 'true'); break;

        // Background refresh banner
        case 'apply-pending-new': applyPendingNew(); break;

        // Cookie banner, footer, modals
        case 'dismiss-cookie-banner': dismissCookieBanner(); break;
        case 'show-modal': showModal(el.dataset.modal); break;
        case 'close-modal': closeModal(); break;
        case 'close-modal-backdrop':
          if (e.target === el) closeModal();
          break;
      }
    });

    document.addEventListener('change', (e) => {
      const el = e.target.closest('[data-action="toggle-subscription"]');
      if (el) toggleSubscription(el.dataset.name, el.checked);
    });

    document.getElementById('search').addEventListener('input', debounceSearch);

    // Init
    loadStats();
    loadFilters();
    loadFeedHealth();
    loadFeed().then(() => handleRoute());

    // Server refreshes feeds on its own per-feed schedule; client just polls
    // for new-article counts and periodically refreshes stats + health.
    setInterval(pollNewCount, 60 * 1000);
    setInterval(() => { loadStats(); loadFeedHealth(); }, 5 * 60 * 1000);
  </script>
</body>
</html>
