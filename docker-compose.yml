# Local / homelab dev (Traefik at dcwd.dev).
# Production on Azure Container Apps doesn't use this file — the pipeline
# deploys straight from the Dockerfile.
services:
  lattice:
    build: .
    container_name: lattice
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      # Host port configurable to avoid clashes (e.g. with VS Code on :3000).
      # Override with LATTICE_PORT=... or a .env file next to this compose.
      - "${LATTICE_PORT:-3010}:3000"
    volumes:
      - ./feeds.json:/app/feeds.json:ro
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://lattice:lattice@postgres:5432/lattice
      # Optional: set ANTHROPIC_API_KEY to enable AI summaries / digest.
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.lattice.entrypoints=http"
      - "traefik.http.routers.lattice.rule=Host(`lattice.dcwd.dev`)"
      - "traefik.http.routers.lattice.middlewares=traefik-https-redirect"
      # HTTPS
      - "traefik.http.routers.lattice-secure.entrypoints=https"
      - "traefik.http.routers.lattice-secure.rule=Host(`lattice.dcwd.dev`)"
      - "traefik.http.routers.lattice-secure.tls=true"
      - "traefik.http.routers.lattice-secure.tls.certresolver=cloudflare"
      - "traefik.http.services.lattice.loadbalancer.server.port=3000"

  postgres:
    image: postgres:16-alpine
    container_name: lattice-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=lattice
      - POSTGRES_PASSWORD=lattice
      - POSTGRES_DB=lattice
    volumes:
      - lattice-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lattice -d lattice"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default

networks:
  default:
  proxy:
    external: true

volumes:
  lattice-pgdata:
