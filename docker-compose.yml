# Local dev only. Production runs on Azure Container Apps with a managed
# Postgres (see .github/workflows/deploy.yml).
services:
  lattice:
    build: .
    container_name: lattice
    restart: unless-stopped
    ports:
      # Host port configurable to avoid clashes (e.g. with VS Code on :3000).
      # Override with LATTICE_PORT=... or put it in .env next to this file.
      - "${LATTICE_PORT:-3010}:3000"
    volumes:
      - ./feeds.json:/app/feeds.json:ro
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://lattice:lattice@postgres:5432/lattice
      # Optional: set ANTHROPIC_API_KEY to enable AI summaries / digest.
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: lattice-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=lattice
      - POSTGRES_PASSWORD=lattice
      - POSTGRES_DB=lattice
    volumes:
      - lattice-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lattice -d lattice"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lattice-pgdata:
