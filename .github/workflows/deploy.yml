name: Deploy to Azure Container Apps

# Push to master builds + pushes a new image to ACR and rolls the Container App.
# Also exposes workflow_dispatch so you can trigger a redeploy manually.
#
# One-time setup required in the GitHub repo (Settings → Secrets and variables → Actions):
#
#   Secrets (federated OIDC — no client secret needed):
#     AZURE_CLIENT_ID        app registration client id
#     AZURE_TENANT_ID        Azure AD tenant id
#     AZURE_SUBSCRIPTION_ID  subscription id
#
#   Variables:
#     AZURE_RESOURCE_GROUP   e.g. rg-lattice
#     ACR_NAME               e.g. latticeacr    (login server = <name>.azurecr.io)
#     CONTAINER_APP_NAME     e.g. lattice
#     IMAGE_NAME             e.g. lattice
#
# And on the Azure side, once:
#   1. Create an App Registration + federated credential for this repo/branch.
#   2. Grant the app AcrPush on the ACR and Contributor on the Container App's RG.
#   3. Container App must already exist (create once via az CLI or portal).
#      Configure it with DATABASE_URL + DATABASE_SSL=true as secrets, pointing
#      at an Azure Database for PostgreSQL Flexible Server. Set
#      ANTHROPIC_API_KEY as a secret if you want the AI features on.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ vars.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ vars.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ vars.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ vars.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ vars.IMAGE_NAME }}:cache,mode=max

      - name: Roll Container App to new image
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/${{ vars.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Summary
        run: |
          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.ACR_LOGIN_SERVER }}/${{ vars.IMAGE_NAME }}:${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Container App: \`${{ vars.CONTAINER_APP_NAME }}\`" >> $GITHUB_STEP_SUMMARY
